<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khushali Kumawat | Data Analyst</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #fff;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px;
}

.profile-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #38bdf8;
}

h1 {
    font-family: 'Poppins', sans-serif;
    margin: 15px 0 5px;
}

p {
    color: #cbd5f5;
}

/* SECTION */
section {
    padding: 40px 20px;
    max-width: 1100px;
    margin: auto;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
}

/* CARDS */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 20px;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #38bdf8;
    color: black;
    text-decoration: none;
    border-radius: 6px;
}

/* SKILLS */
.skills {
    text-align: center;
    font-size: 18px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

</style>
</head>

<body>

<header>

<!-- ONLY CHANGES MADE: IMAGE PATHS FIXED -->

<!-- PROFILE IMAGE -->
<img
  src="IMG-20250303-WA0038.jpg"
  alt="Khushali Kumawat"
  class="profile-photo"
  onerror="this.style.display='none'; document.getElementById('profile-fallback').style.display='flex';"
/>

<!-- ECOMMERCE -->
<img
  src="ecommerce.png"
  alt="Ecommerce Dashboard"
  loading="lazy"
  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
/>

<!-- RETAIL -->
<img
  src="retail.png"
  alt="Retail Sales Dashboard"
  loading="lazy"
  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
/>

<!-- CUSTOMER (FIXED CAPITAL C) -->
<img
  src="Customer.png"
  alt="Customer Insights Dashboard"
  loading="lazy"
  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
/>
<section>
<h2>🛠 Skills</h2>
<div class="skills">
SQL | Power BI | Data Analysis | Data Visualization | Statistics
</div>
</section>

<section>

</p>
</section>

</footer>

</body>
</html>
